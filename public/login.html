<style>
body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background:var(--bg); }
.auth-wrap { width:100%; max-width:400px; }
.auth-logo { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:28px; }
.auth-logo-icon { width:34px; height:34px; border-radius:8px; background:linear-gradient(135deg,var(--gold),#6b4a10); display:flex; align-items:center; justify-content:center; color:#000; }
.auth-logo-text { font-size:15px; font-weight:700; color:var(--gold); letter-spacing:.08em; }
.auth-card { background:var(--surface); border:1px solid var(--border2); border-radius:16px; padding:28px; }
.auth-title { font-size:20px; font-weight:700; margin-bottom:5px; }
.auth-sub { font-size:13px; color:var(--text2); line-height:1.65; margin-bottom:22px; }
.auth-tabs { display:flex; background:var(--bg2); border-radius:8px; padding:3px; margin-bottom:20px; gap:2px; }
.auth-tab { flex:1; padding:8px; border-radius:6px; border:none; background:none; font-family:var(--font); font-size:13px; font-weight:500; cursor:pointer; color:var(--text2); transition:all .15s; }
.auth-tab.active { background:var(--surface2); color:var(--text); }
.auth-err { background:var(--red-dim); border:1px solid rgba(248,113,113,.25); border-radius:7px; padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:14px; display:none; line-height:1.5; }
.auth-or { display:flex; align-items:center; gap:12px; margin:16px 0; }
.auth-or::before,.auth-or::after { content:''; flex:1; height:1px; background:var(--border); }
.auth-or span { font-size:11px; color:var(--text3); }
.google-btn { width:100%; padding:11px; border-radius:8px; border:1px solid var(--border2); background:var(--bg2); color:var(--text); font-family:var(--font); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:all .15s; }
.google-btn:hover { border-color:var(--border3); background:var(--surface2); }
.auth-links { display:flex; align-items:center; justify-content:center; gap:8px; font-size:12px; color:var(--text3); margin-top:16px; }
.auth-features { display:flex; gap:8px; margin-top:20px; justify-content:center; flex-wrap:wrap; }
.auth-feat { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:11px; color:var(--text3); display:flex; align-items:center; gap:5px; }
.btn-spin::after { content:''; width:13px; height:13px; border-radius:50%; border:2px solid rgba(0,0,0,.25); border-top-color:#000; animation:spin .6s linear infinite; margin-left:6px; }
</style>

<script src="app.js?v=47"></script>
<script>
var tab = 'in';
function switchTab(t){
  tab=t;
  document.getElementById('formIn').style.display=t==='in'?'':'none';
  document.getElementById('formUp').style.display=t==='up'?'':'none';
  document.getElementById('tabIn').classList.toggle('active',t==='in');
  document.getElementById('tabUp').classList.toggle('active',t==='up');
  showErr('');
}
function showErr(m){ var e=document.getElementById('errBox'); e.textContent=m; e.style.display=m?'block':'none'; }
function setLoad(id,on){ var b=document.getElementById(id); b.disabled=on; if(on)b.classList.add('btn-spin'); else b.classList.remove('btn-spin'); }

window.addEventListener('auth:ready', function(e){
  if(e.detail?.user){
    var raw=new URLSearchParams(location.search).get('next')||'';
    // Only allow relative paths to prevent open-redirect attacks
    var ALLOWED=['command.html','pipeline.html','intelligence.html','comms.html','analytics.html','vault.html','security.html','admin.html','resources.html','mediakit.html'];
    var next=ALLOWED.indexOf(raw)!==-1?raw:'command.html';
    location.href=next;
  }
});

async function waitSB(){ if(!window._sb) await new Promise(r=>window.addEventListener('sb:ready',r,{once:true})); }
async function doSignIn(){
  showErr(''); var em=document.getElementById('inEmail').value.trim(), pw=document.getElementById('inPass').value;
  if(!em||!pw){showErr('Please enter email and password.');return;}
  setLoad('inBtn',true);
  await waitSB();
  var data=await Auth.signInEmail(em,pw);
  if(!data){showErr('Invalid email or password.');setLoad('inBtn',false);}
  else {
    var raw=new URLSearchParams(location.search).get('next')||'';
    var ALLOWED=['command.html','pipeline.html','intelligence.html','comms.html','analytics.html','vault.html','security.html','admin.html','resources.html','mediakit.html'];
    location.href=ALLOWED.indexOf(raw)!==-1?raw:'command.html';
  }
}
async function doSignUp(){
  showErr(''); var nm=document.getElementById('upName').value.trim(), em=document.getElementById('upEmail').value.trim(), pw=document.getElementById('upPass').value;
  if(!nm||!em||!pw){showErr('Please fill in all fields.');return;}
  if(pw.length<8){showErr('Password must be at least 8 characters.');return;}
  setLoad('upBtn',true);
  await waitSB();
  var data=await Auth.signUp(em,pw,nm);
  if(!data){showErr('Sign up failed. This email may already be registered.');setLoad('upBtn',false);}
  else {
    document.querySelector('.auth-card').innerHTML='<div style="text-align:center;padding:28px 0"><div style="font-size:42px;margin-bottom:16px">✉️</div><div style="font-size:18px;font-weight:700;margin-bottom:10px">Check your email</div><p style="font-size:13px;color:var(--text2);line-height:1.7">We sent a confirmation link to <strong id="_em_node"></strong>.<br>Click it to activate your account, then sign in.</p><a href="login.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex">Back to Sign In</a></div>';
    document.getElementById('_em_node').textContent=em;
  }
}
async function doGoogle(){ await waitSB(); await Auth.signInGoogle(); }
async function doReset(){
  var em=prompt('Enter your email for a password reset link:');
  if(!em) return;
  await waitSB(); await Auth.resetPw(em);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')tab==='in'?doSignIn():doSignUp();});
</script>
